<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Archive — Holded</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --coral: #FF6B5B;
      --coral-light: #FFF0EE;
      --coral-dark: #E04D3D;
      --navy: #1A1F36;
      --navy-light: #2D3348;
      --slate: #64748B;
      --silver: #F1F5F9;
      --white: #FFFFFF;
      --shadow-sm: 0 1px 2px rgba(26,31,54,0.05);
      --shadow-md: 0 4px 12px rgba(26,31,54,0.08);
      --shadow-lg: 0 12px 40px rgba(26,31,54,0.12);
      --radius: 16px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: linear-gradient(145deg, #FAFBFC 0%, #F1F5F9 100%);
      min-height: 100vh;
      color: var(--navy);
      line-height: 1.6;
    }

    .noise-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; opacity: 0.03; z-index: 1000;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    /* --- Setup Banner --- */
    .setup-banner {
      background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
      border: 1px solid #F59E0B;
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.9rem;
      color: #92400E;
    }
    .setup-banner svg { width: 24px; height: 24px; stroke: #D97706; flex-shrink: 0; }
    .setup-banner code { background: rgba(0,0,0,0.08); padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; }
    .setup-banner.hidden { display: none; }

    /* --- Header --- */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 2rem 0 3rem; flex-wrap: wrap; gap: 1.5rem;
    }

    .logo { display: flex; align-items: center; gap: 14px; }

    .logo-icon {
      width: 52px; height: 52px; background: var(--coral);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(255,107,91,0.3);
    }
    .logo-icon svg { width: 26px; height: 26px; stroke: white; fill: none; }

    .logo-text h1 {
      font-family: 'Fraunces', serif; font-size: 1.75rem;
      font-weight: 700; letter-spacing: -0.02em; color: var(--navy);
    }
    .logo-text span { font-size: 0.875rem; color: var(--slate); font-weight: 400; }

    .header-actions { display: flex; gap: 12px; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 20px; border-radius: var(--radius-sm);
      font-size: 0.9rem; font-weight: 500; cursor: pointer;
      transition: all 0.2s ease; border: none; font-family: inherit;
    }
    .btn-primary {
      background: var(--coral); color: white;
      box-shadow: 0 4px 12px rgba(255,107,91,0.25);
    }
    .btn-primary:hover {
      background: var(--coral-dark); transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255,107,91,0.35);
    }
    .btn-secondary { background: white; color: var(--navy); border: 1px solid #E2E8F0; }
    .btn-secondary:hover { background: var(--silver); border-color: #CBD5E1; }
    .btn svg { width: 18px; height: 18px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* --- Stats --- */
    .stats-bar {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px; margin-bottom: 2rem;
    }
    .stat-card {
      background: white; padding: 1.25rem 1.5rem;
      border-radius: var(--radius); box-shadow: var(--shadow-sm);
      border: 1px solid rgba(0,0,0,0.04);
    }
    .stat-card .label {
      font-size: 0.8rem; color: var(--slate);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;
    }
    .stat-card .value {
      font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 700; color: var(--navy);
    }

    /* --- Search --- */
    .search-section {
      background: white; padding: 1.5rem; border-radius: var(--radius);
      box-shadow: var(--shadow-md); margin-bottom: 2rem;
      border: 1px solid rgba(0,0,0,0.04);
    }
    .search-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .search-input-wrap { flex: 1; min-width: 280px; position: relative; }
    .search-input-wrap svg {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; stroke: var(--slate);
    }
    .search-input {
      width: 100%; padding: 14px 16px 14px 48px; border: 1px solid #E2E8F0;
      border-radius: var(--radius-sm); font-size: 1rem; font-family: inherit;
      transition: all 0.2s ease;
    }
    .search-input:focus { outline: none; border-color: var(--coral); box-shadow: 0 0 0 3px rgba(255,107,91,0.1); }

    .filter-tabs { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; }
    .filter-tab {
      padding: 8px 16px; border-radius: 100px; font-size: 0.85rem;
      font-weight: 500; cursor: pointer; transition: all 0.2s ease;
      border: 1px solid #E2E8F0; background: white; color: var(--slate);
      font-family: inherit;
    }
    .filter-tab:hover { border-color: var(--coral); color: var(--coral); }
    .filter-tab.active { background: var(--coral-light); border-color: var(--coral); color: var(--coral-dark); }

    /* --- Quotes Grid --- */
    .quotes-grid { display: grid; gap: 20px; }

    .quote-card {
      background: white; border-radius: var(--radius); padding: 1.75rem;
      box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.04);
      transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .quote-card::before {
      content: '\201C'; position: absolute; top: -20px; right: 20px;
      font-family: 'Fraunces', serif; font-size: 8rem; color: var(--coral);
      opacity: 0.06; line-height: 1; pointer-events: none;
    }
    .quote-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

    .quote-text {
      font-family: 'Fraunces', serif; font-size: 1.15rem; font-weight: 400;
      font-style: italic; line-height: 1.7; color: var(--navy);
      margin-bottom: 1.25rem; position: relative; z-index: 1;
    }

    .quote-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .quote-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--coral) 0%, var(--coral-dark) 100%);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 600; font-size: 0.9rem; flex-shrink: 0;
    }
    .quote-author { flex: 1; }
    .quote-author .name { font-weight: 600; color: var(--navy); font-size: 0.95rem; }
    .quote-author .role { font-size: 0.85rem; color: var(--slate); }

    .quote-tags {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1rem;
      padding-top: 1rem; border-top: 1px solid #F1F5F9;
    }
    .tag { padding: 4px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 500; }
    .tag-source { background: #EEF2FF; color: #4F46E5; }
    .tag-page { background: #F0FDF4; color: #16A34A; }
    .tag-theme { background: var(--coral-light); color: var(--coral-dark); }

    .quote-actions {
      position: absolute; top: 1rem; right: 1rem; display: flex; gap: 6px;
      opacity: 0; transition: opacity 0.2s ease;
    }
    .quote-card:hover .quote-actions { opacity: 1; }
    .action-btn {
      width: 32px; height: 32px; border-radius: 8px; border: none;
      background: var(--silver); cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all 0.2s ease;
    }
    .action-btn:hover { background: var(--coral-light); }
    .action-btn svg { width: 16px; height: 16px; stroke: var(--slate); }
    .action-btn:hover svg { stroke: var(--coral); }

    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--slate); }
    .empty-state svg { width: 64px; height: 64px; stroke: #CBD5E1; margin-bottom: 1rem; }
    .empty-state h3 { font-family: 'Fraunces', serif; font-size: 1.5rem; color: var(--navy); margin-bottom: 0.5rem; }

    /* --- Loading --- */
    .loading-state { text-align: center; padding: 4rem 2rem; color: var(--slate); }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #E2E8F0;
      border-top-color: var(--coral); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- Modal --- */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(26,31,54,0.6); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; visibility: hidden;
      transition: all 0.3s ease; padding: 1rem;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }

    .modal {
      background: white; border-radius: var(--radius);
      width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow-lg); transform: translateY(20px);
      transition: transform 0.3s ease;
    }
    .modal-overlay.active .modal { transform: translateY(0); }

    .modal-header {
      padding: 1.5rem; border-bottom: 1px solid #F1F5F9;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h2 { font-family: 'Fraunces', serif; font-size: 1.35rem; font-weight: 600; }

    .modal-close {
      width: 36px; height: 36px; border-radius: 8px; border: none;
      background: var(--silver); cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .modal-close:hover { background: #E2E8F0; }

    .modal-body { padding: 1.5rem; }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px; color: var(--navy); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 12px 14px; border: 1px solid #E2E8F0;
      border-radius: var(--radius-sm); font-size: 0.95rem; font-family: inherit;
      transition: all 0.2s ease;
    }
    .form-group textarea { min-height: 120px; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none; border-color: var(--coral);
      box-shadow: 0 0 0 3px rgba(255,107,91,0.1);
    }

    .modal-footer {
      padding: 1rem 1.5rem; border-top: 1px solid #F1F5F9;
      display: flex; gap: 12px; justify-content: flex-end;
    }

    /* --- Toast --- */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; background: var(--navy);
      color: white; padding: 1rem 1.5rem; border-radius: var(--radius-sm);
      box-shadow: var(--shadow-lg); display: flex; align-items: center;
      gap: 10px; z-index: 200; transform: translateY(100px); opacity: 0;
      transition: all 0.3s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast svg { width: 20px; height: 20px; stroke: #4ADE80; }
    .toast.error svg { stroke: #F87171; }

    footer { text-align: center; padding: 3rem 0 2rem; color: var(--slate); font-size: 0.85rem; }
    footer a { color: var(--coral); text-decoration: none; }

    @media (max-width: 640px) {
      .container { padding: 1rem; }
      header { padding: 1rem 0 2rem; }
      .logo-text h1 { font-size: 1.4rem; }
      .quote-text { font-size: 1.05rem; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .header-actions { width: 100%; }
      .header-actions .btn { flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>

  <div class="container">
    <!-- Setup banner (shown when Supabase is not configured) -->
    <div class="setup-banner" id="setup-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>Running in <strong>demo mode</strong> (data not persisted). Connect Supabase to enable persistence — see <code>README.md</code></span>
    </div>

    <header>
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21"/>
            <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1"/>
          </svg>
        </div>
        <div class="logo-text">
          <h1>Quote Archive</h1>
          <span>Expert Partner social proof</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-secondary" onclick="exportQuotes()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
        <button class="btn btn-primary" onclick="openModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add quote
        </button>
      </div>
    </header>

    <div class="stats-bar">
      <div class="stat-card">
        <div class="label">Total quotes</div>
        <div class="value" id="stat-total">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Sources</div>
        <div class="value" id="stat-sources">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Speakers</div>
        <div class="value" id="stat-speakers">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Themes</div>
        <div class="value" id="stat-themes">-</div>
      </div>
    </div>

    <div class="search-section">
      <div class="search-row">
        <div class="search-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="search-input" id="search-input" placeholder="Search quotes by text, speaker, or theme..." oninput="filterQuotes()">
        </div>
      </div>
      <div class="filter-tabs" id="filter-tabs"></div>
    </div>

    <div class="quotes-grid" id="quotes-grid">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading quotes...</p>
      </div>
    </div>

    <footer>
      Built with care for <a href="https://holded.com" target="_blank">Holded</a> &middot; Partner social proof archive
    </footer>
  </div>

  <!-- Add/Edit Quote Modal -->
  <div class="modal-overlay" id="modal-add">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Add new quote</h2>
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="form-id">
        <div class="form-group">
          <label>Quote text *</label>
          <textarea id="form-text" placeholder="Enter the quote..."></textarea>
        </div>
        <div class="form-group">
          <label>Speaker name *</label>
          <input type="text" id="form-speaker" placeholder="Who said this?">
        </div>
        <div class="form-group">
          <label>Company *</label>
          <input type="text" id="form-company" placeholder="Company or organization">
        </div>
        <div class="form-group">
          <label>Role / Title</label>
          <input type="text" id="form-role" placeholder="CEO, Partner, Founder...">
        </div>
        <div class="form-group">
          <label>Source</label>
          <input type="text" id="form-source" placeholder="Interview, event, document...">
        </div>
        <div class="form-group">
          <label>Theme</label>
          <input type="text" id="form-theme" placeholder="Collaboration, Digitalization...">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="btn-save" onclick="saveQuote()">Save quote</button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <span id="toast-message">Quote saved!</span>
  </div>

  <script>
    // ============================================================
    // SUPABASE CONFIG — Replace with your project credentials
    // ============================================================
    const SUPABASE_URL  = 'https://dzpygadmtuoxoesamlet.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_Yo0Pd0xNB0sHhKeCDNrynw_MHHnZB5D';

    // ============================================================
    // State
    // ============================================================
    let supabaseClient = null;
    let useSupabase = false;
    let quotes = [];
    let currentFilter = 'all';

    // Seed data (used in demo mode or to populate DB on first run)
    const SEED_QUOTES = [
      { text: "Nosotros somos una asesoría colaborativa. Buscamos que tanto el trabajo del cliente valga para nosotros como que nuestro trabajo valga para el cliente.", speaker: "Fin2Go", company: "Fin2Go", role: "Asesoría colaborativa", source: "FIN2GO × Holded Interview", source_key: "fin2go", theme: "Colaboración" },
      { text: "Lo que conseguimos es que la contabilidad se convierta en información financiera para que el cliente tenga esa información en la nube y accesible y por lo tanto, a partir de ahí puede tomar decisiones.", speaker: "Fin2Go", company: "Fin2Go", role: "Asesoría colaborativa", source: "FIN2GO × Holded Interview", source_key: "fin2go", theme: "Toma de decisiones" },
      { text: "Hay clientes que necesitan una contabilidad más al día, donde no es impuesto centrista. Lo importante son las finanzas.", speaker: "Fin2Go", company: "Fin2Go", role: "Asesoría colaborativa", source: "FIN2GO × Holded Interview", source_key: "fin2go", theme: "Enfoque financiero" },
      { text: "Lo que encontramos con Holded es esa herramienta colaborativa donde el cliente y nosotros podíamos trabajar en un mismo entorno, donde nuestro trabajo además pasaba a ser transparente.", speaker: "Fin2Go", company: "Fin2Go", role: "Asesoría colaborativa", source: "FIN2GO × Holded Interview", source_key: "fin2go", theme: "Transparencia" },
      { text: "El cliente con una herramienta colaborativa es propietario de esa información financiera y a partir de ahí puede tomar las decisiones.", speaker: "Fin2Go", company: "Fin2Go", role: "Asesoría colaborativa", source: "FIN2GO × Holded Interview", source_key: "fin2go", theme: "Propiedad de datos" },
      { text: "No hay que confundir ser simplista con ser simple. Ser simple es mejorar la vida para todos y dar la mejor herramienta y ser lo más productivos posible.", speaker: "Fin2Go", company: "Fin2Go", role: "Asesoría colaborativa", source: "FIN2GO × Holded Interview", source_key: "fin2go", theme: "Simplicidad" },
      { text: "No somos una asesoría impuesto centrista. Trabajamos para que el empresario conozca los datos financieros de su empresa.", speaker: "Fin2Go", company: "Fin2Go", role: "Asesoría colaborativa", source: "FIN2GO × Holded Interview", source_key: "fin2go", theme: "Valor añadido" },
      { text: "Si los clientes nos enviaran las facturas de forma manual como se hacía antaño, no podríamos tener tantos clientes como tenemos ahora.", speaker: "Fin2Go", company: "Fin2Go", role: "Asesoría colaborativa", source: "FIN2GO × Holded Interview", source_key: "fin2go", theme: "Escalabilidad" },
      { text: "Holded cubre el 90% de las necesidades del 90% de las empresas.", speaker: "Fin2Go", company: "Fin2Go", role: "Asesoría colaborativa", source: "FIN2GO × Holded Interview", source_key: "fin2go", theme: "Cobertura" },
      { text: "Ser partner de Holded significa para el cliente seguridad de tener partners aliados. Para nosotros significa crecer junto a un partner estratégico que nos da garantía de éxito.", speaker: "Fin2Go", company: "Fin2Go", role: "Asesoría colaborativa", source: "FIN2GO × Holded Interview", source_key: "fin2go", theme: "Partnership" },
      { text: "Van a ir desapareciendo estas herramientas opacas hacia el cliente. Va a ser todo mucho más transparente.", speaker: "Fin2Go", company: "Fin2Go", role: "Asesoría colaborativa", source: "FIN2GO × Holded Interview", source_key: "fin2go", theme: "Futuro" },
      { text: "No hay nada más fácil que tenerlo todo integrado.", speaker: "Fin2Go", company: "Fin2Go", role: "Asesoría colaborativa", source: "FIN2GO × Holded Interview", source_key: "fin2go", theme: "Integración" },
      { text: "El futuro va a ser Holded. Ya no hay marcha atrás.", speaker: "Fin2Go", company: "Fin2Go", role: "Asesoría colaborativa", source: "FIN2GO × Holded Interview", source_key: "fin2go", theme: "Futuro" },
      { text: "Holded se ha convertido en una pieza clave en aquellas gestorías que desean dar el paso de la digitalización.", speaker: "Manel Montero", company: "MANPAT", role: "CEO de MANPAT", source: "Contabilidad Colaborativa 2024", source_key: "collab", theme: "Digitalización" },
      { text: "Conseguimos tener la información actualizada, de una forma muy sencilla y sin estar perdiendo tiempo en la introducción de datos.", speaker: "Manel Montero", company: "MANPAT", role: "CEO de MANPAT", source: "Contabilidad Colaborativa 2024", source_key: "collab", theme: "Eficiencia" },
      { text: "El módulo de facturación de Holded lo hace todo. Cualquier empresa puede entender sus servicios o sus productos y estandarizarlos. Funciona increíblemente bien.", speaker: "Josep Rovira", company: "Cratevo", role: "Fundador y CEO de Cratevo", source: "Contabilidad Colaborativa 2024", source_key: "collab", theme: "Facturación" },
      { text: "Este año hemos completado la presentación de impuestos con éxito de la mano de Holded. Realmente sentimos que trabajamos como un equipo.", speaker: "Javier Piqueras", company: "PQS Consulting", role: "CEO de PQS Consulting", source: "Contabilidad Colaborativa 2024", source_key: "collab", theme: "Colaboración" },
      { text: "Con Holded, la conciliación bancaria no solo es rápida, es clave para la contabilidad colaborativa.", speaker: "Gloria Casao", company: "The Table", role: "CEO y socia de The Table", source: "Contabilidad Colaborativa 2024", source_key: "collab", theme: "Conciliación bancaria" },
      { text: "Ahora creamos un proyecto para cada cliente y nuestro equipo registra las horas. Así podemos calcular el precio/hora por cliente y tener control sobre su rentabilidad.", speaker: "Javier Díaz", company: "Exentys", role: "CEO y fundador de Exentys", source: "Contabilidad Colaborativa 2024", source_key: "collab", theme: "Rentabilidad" },
      { text: "La contabilidad colaborativa es una nueva forma de trabajar que rompe barreras y genera una relación de mayor transparencia y confianza entre asesores y clientes.", speaker: "Holded", company: "Holded", role: "Documento oficial", source: "Contabilidad Colaborativa 2024", source_key: "collab", theme: "Transformación" },
      { text: "En pleno siglo XXI, la digitalización ha dejado de ser una opción para convertirse en una necesidad absoluta.", speaker: "Javier Hurtado", company: "AEAT", role: "Representante de la AEAT", source: "Verifactu con Holded", source_key: "verifactu", theme: "Digitalización" },
      { text: "Tener acceso real a la información de facturación es clave para mejorar el cumplimiento fiscal y dar un mejor servicio a empresas y autónomos.", speaker: "Javier Hurtado", company: "AEAT", role: "Representante de la AEAT", source: "Verifactu con Holded", source_key: "verifactu", theme: "Cumplimiento fiscal" },
      { text: "Si el software y las asesorías están asociados, todos sus clientes podrán estar tranquilos, ya que se habrá solucionado su problema.", speaker: "Javier Hurtado", company: "AEAT", role: "Representante de la AEAT", source: "Verifactu con Holded", source_key: "verifactu", theme: "Partnerships" },
      { text: "El consejo es claro: cuanto antes, mejor. No lo dejes para el último momento.", speaker: "Javier Hurtado", company: "AEAT", role: "Representante de la AEAT", source: "Verifactu con Holded", source_key: "verifactu", theme: "Preparación" },
      { text: "Verifactu es una oportunidad para colaborar más con nuestros clientes y, gracias a la facilidad de Holded en esta fase voluntaria, las asesorías podrán llegar preparadas al 1 de enero.", speaker: "Florencia D'Andrea", company: "Lidera tu negocio", role: "Directora del área fiscal y contable", source: "Verifactu con Holded", source_key: "verifactu", theme: "Oportunidad" }
    ];

    const SOURCE_LABELS = {
      fin2go: 'FIN2GO Interview',
      collab: 'Contabilidad Colaborativa',
      verifactu: 'Verifactu',
      custom: 'My quotes'
    };

    // ============================================================
    // Boot
    // ============================================================
    async function init() {
      if (SUPABASE_URL && SUPABASE_ANON) {
        try {
          supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
          useSupabase = true;
          document.getElementById('setup-banner').classList.add('hidden');
        } catch (e) {
          console.warn('Supabase init failed, using demo mode', e);
        }
      }

      if (useSupabase) {
        await loadFromSupabase();
      } else {
        quotes = SEED_QUOTES.map((q, i) => ({ ...q, id: i + 1 }));
      }

      updateStats();
      updateFilterTabs();
      filterQuotes();
    }

    async function loadFromSupabase() {
      try {
        const { data, error } = await supabaseClient
          .from('quotes')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (data.length === 0) {
          const { data: seeded, error: seedErr } = await supabaseClient
            .from('quotes')
            .insert(SEED_QUOTES)
            .select();
          if (seedErr) throw seedErr;
          quotes = seeded;
          showToast('Database seeded with initial quotes!');
        } else {
          quotes = data;
        }
      } catch (e) {
        console.error('Supabase error:', e);
        showToast('Error loading from Supabase. Using demo data.', true);
        quotes = SEED_QUOTES.map((q, i) => ({ ...q, id: i + 1 }));
        useSupabase = false;
      }
    }

    // ============================================================
    // Rendering
    // ============================================================
    function getInitials(name) {
      return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function renderQuotes(list) {
      const grid = document.getElementById('quotes-grid');

      if (list.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <h3>No quotes found</h3>
            <p>Try adjusting your search or filters</p>
          </div>`;
        return;
      }

      grid.innerHTML = list.map(q => `
        <div class="quote-card" data-id="${q.id}">
          <div class="quote-actions">
            <button class="action-btn" onclick="copyQuote(${q.id})" title="Copy">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
            </button>
            <button class="action-btn" onclick="editQuote(${q.id})" title="Edit">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button class="action-btn" onclick="deleteQuote(${q.id})" title="Delete">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
            </button>
          </div>
          <p class="quote-text">\u201C${escapeHtml(q.text)}\u201D</p>
          <div class="quote-meta">
            <div class="quote-avatar">${getInitials(q.speaker)}</div>
            <div class="quote-author">
              <div class="name">${escapeHtml(q.speaker)}</div>
              <div class="role">${escapeHtml(q.role || q.company || '')}</div>
            </div>
          </div>
          <div class="quote-tags">
            ${q.source ? `<span class="tag tag-source">${escapeHtml(q.source)}</span>` : ''}
            ${q.company ? `<span class="tag tag-page">${escapeHtml(q.company)}</span>` : ''}
            ${q.theme ? `<span class="tag tag-theme">${escapeHtml(q.theme)}</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    // ============================================================
    // Filter & Search
    // ============================================================
    function filterQuotes() {
      const query = document.getElementById('search-input').value.toLowerCase();
      let filtered = quotes;

      if (currentFilter !== 'all') {
        filtered = filtered.filter(q => q.source_key === currentFilter);
      }

      if (query) {
        filtered = filtered.filter(q =>
          (q.text || '').toLowerCase().includes(query) ||
          (q.speaker || '').toLowerCase().includes(query) ||
          (q.company || '').toLowerCase().includes(query) ||
          (q.theme || '').toLowerCase().includes(query) ||
          (q.source || '').toLowerCase().includes(query)
        );
      }

      renderQuotes(filtered);
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.filter === filter);
      });
      filterQuotes();
    }

    function updateFilterTabs() {
      const keys = [...new Set(quotes.map(q => q.source_key).filter(Boolean))];
      const container = document.getElementById('filter-tabs');
      let html = `<button class="filter-tab ${currentFilter === 'all' ? 'active' : ''}" data-filter="all" onclick="setFilter('all')">All quotes</button>`;
      keys.forEach(key => {
        const label = SOURCE_LABELS[key] || key;
        html += `<button class="filter-tab ${currentFilter === key ? 'active' : ''}" data-filter="${key}" onclick="setFilter('${key}')">${label}</button>`;
      });
      container.innerHTML = html;
    }

    function updateStats() {
      document.getElementById('stat-total').textContent    = quotes.length;
      document.getElementById('stat-sources').textContent  = [...new Set(quotes.map(q => q.source).filter(Boolean))].length;
      document.getElementById('stat-speakers').textContent = [...new Set(quotes.map(q => q.speaker).filter(Boolean))].length;
      document.getElementById('stat-themes').textContent   = [...new Set(quotes.map(q => q.theme).filter(Boolean))].length;
    }

    // ============================================================
    // CRUD operations
    // ============================================================
    function openModal() {
      document.getElementById('form-id').value = '';
      document.getElementById('form-text').value = '';
      document.getElementById('form-speaker').value = '';
      document.getElementById('form-company').value = '';
      document.getElementById('form-role').value = '';
      document.getElementById('form-source').value = '';
      document.getElementById('form-theme').value = '';
      document.getElementById('modal-title').textContent = 'Add new quote';
      document.getElementById('btn-save').textContent = 'Save quote';
      document.getElementById('modal-add').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal-add').classList.remove('active');
    }

    function editQuote(id) {
      const q = quotes.find(x => x.id === id);
      if (!q) return;
      document.getElementById('form-id').value = id;
      document.getElementById('form-text').value = q.text;
      document.getElementById('form-speaker').value = q.speaker;
      document.getElementById('form-company').value = q.company || '';
      document.getElementById('form-role').value = q.role || '';
      document.getElementById('form-source').value = q.source || '';
      document.getElementById('form-theme').value = q.theme || '';
      document.getElementById('modal-title').textContent = 'Edit quote';
      document.getElementById('btn-save').textContent = 'Update quote';
      document.getElementById('modal-add').classList.add('active');
    }

    async function saveQuote() {
      const editId  = document.getElementById('form-id').value;
      const text    = document.getElementById('form-text').value.trim();
      const speaker = document.getElementById('form-speaker').value.trim();
      const company = document.getElementById('form-company').value.trim();
      const role    = document.getElementById('form-role').value.trim();
      const source  = document.getElementById('form-source').value.trim();
      const theme   = document.getElementById('form-theme').value.trim();

      if (!text || !speaker || !company) {
        showToast('Please fill in quote text, speaker, and company', true);
        return;
      }

      const btn = document.getElementById('btn-save');
      btn.disabled = true;

      const record = {
        text, speaker, company,
        role: role || '',
        source: source || 'Manual entry',
        source_key: 'custom',
        theme: theme || 'General'
      };

      try {
        if (useSupabase) {
          if (editId) {
            const { data, error } = await supabaseClient.from('quotes').update(record).eq('id', Number(editId)).select().single();
            if (error) throw error;
            const idx = quotes.findIndex(q => q.id === Number(editId));
            if (idx > -1) quotes[idx] = data;
          } else {
            const { data, error } = await supabaseClient.from('quotes').insert(record).select().single();
            if (error) throw error;
            quotes.unshift(data);
          }
        } else {
          if (editId) {
            const idx = quotes.findIndex(q => q.id === Number(editId));
            if (idx > -1) quotes[idx] = { ...quotes[idx], ...record };
          } else {
            record.id = Date.now();
            quotes.unshift(record);
          }
        }

        closeModal();
        updateStats();
        updateFilterTabs();
        filterQuotes();
        showToast(editId ? 'Quote updated!' : 'Quote added!');
      } catch (e) {
        console.error('Save error:', e);
        showToast('Error saving quote. Try again.', true);
      } finally {
        btn.disabled = false;
      }
    }

    async function deleteQuote(id) {
      if (!confirm('Delete this quote?')) return;
      try {
        if (useSupabase) {
          const { error } = await supabaseClient.from('quotes').delete().eq('id', id);
          if (error) throw error;
        }
        quotes = quotes.filter(q => q.id !== id);
        updateStats();
        updateFilterTabs();
        filterQuotes();
        showToast('Quote deleted');
      } catch (e) {
        console.error('Delete error:', e);
        showToast('Error deleting quote', true);
      }
    }

    function copyQuote(id) {
      const q = quotes.find(x => x.id === id);
      if (!q) return;
      navigator.clipboard.writeText(`"${q.text}" \u2014 ${q.speaker}, ${q.company}`);
      showToast('Copied to clipboard!');
    }

    function exportQuotes() {
      const csv = [
        ['Text','Speaker','Company','Role','Source','Theme'].join(','),
        ...quotes.map(q =>
          [q.text, q.speaker, q.company, q.role, q.source, q.theme]
            .map(v => `"${(v||'').replace(/"/g,'""')}"`)
            .join(',')
        )
      ].join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'holded-quotes-export.csv';
      a.click();
      showToast('Exported as CSV!');
    }

    // ============================================================
    // Toast
    // ============================================================
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-message').textContent = message;
      toast.classList.toggle('error', isError);
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Escape closes modal
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // Go!
    init();
  </script>
</body>
</html>
